<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fuel Data Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">
    <div class="auth-container glass-panel">
        <div class="auth-header">
            <img src="tirupati balaji logo.jpeg" alt="Tirupati Balaji Logo"
                style="max-height: 80px; margin-bottom: 10px; border-radius: 8px;">
            <h2>Tirupati Balaji Construction</h2>
            <p>Sign in to manage your fuel data.</p>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign In</button>
            <div id="authMessage" class="message"></div>
        </form>
        <div class="auth-footer" style="display: none;">
            <!-- Registration is handled manually by admin -->
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if (localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
