name: pdf_share_app
description: A Flutter app for uploading and downloading PDF files securely.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  http_parser: ^4.0.2
  file_picker: ^8.0.3
  path_provider: ^2.1.2
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  open_filex: ^4.3.4
  permission_handler: ^11.3.1
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
